<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Genie</title>
  <desc id="desc">Genie — VPS disk-space monitor and safe cleanup. Watches usage, flags growth, and reclaims space with a safe, reviewable sweep.</desc>
  <defs>
    <radialGradient id="bg" cx="0.26" cy="0.34" r="0.9" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15101F"/>
      <stop offset="0.55" stop-color="#0C0F16"/>
      <stop offset="1" stop-color="#0B0E11"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#9B7BFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <circle cx="980" cy="150" r="220" fill="#7C5CFF" opacity="0.06"/>
  <text x="64" y="104" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="-1" fill="#F4F6FB">Genie</text>
  <rect x="66" y="126" width="64" height="4" rx="2" fill="url(#accent)"/>
  <text x="64" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#C7CEDB">VPS disk-space monitor and</text>
  <text x="64" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#C7CEDB">safe, reviewable cleanup.</text>
  <g transform="translate(920 210)">
    <circle cx="0" cy="0" r="90" fill="#0E111A" stroke="#222838" stroke-width="10"/>
    <path d="M0 0 L0 -90 A 90 90 0 1 1 -85 28 Z" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <text x="0" y="-6" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#F4F6FB">74%</text>
    <text x="0" y="26" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8A93A6">USED</text>
    <circle cx="150" cy="-40" r="5" fill="#7C5CFF"/>
    <text x="160" y="-36" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#AEB6C6">scan</text>
    <circle cx="150" cy="0" r="5" fill="#7C5CFF"/>
    <text x="160" y="4" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#AEB6C6">flag</text>
    <circle cx="150" cy="40" r="5" fill="#28C840"/>
    <text x="160" y="44" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#9FE9B0">reclaim</text>
  </g>
  <text x="64" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8A93A6" letter-spacing="2">DISK FULL? GENIE FINDS WHAT IS SAFE TO FREE.</text>
</svg>
